            { id:'removalProc',  en:'Have you EVER been placed in removal, rescission, or deportation proceedings?', es:'¿Alguna vez ha estado en procedimientos de remoción, rescisión o deportación?' },
            { id:'avoidDraft',   en:'Have you EVER left the United States to avoid being drafted in the U.S. armed forces?', es:'¿Alguna vez ha salido de EE. UU. para evitar ser reclutado en las fuerzas armadas?' },
            { id:'exemption',    en:'Have you EVER applied for an exemption from military service in the U.S. armed forces?', es:'¿Alguna vez ha solicitado una exención del servicio militar en las fuerzas armadas de EE. UU.?' },
            { id:'servedForces', en:'Have you EVER served in the U.S. armed forces?', es:'¿Alguna vez ha servido en las fuerzas armadas de EE. UU.?' },
            { id:'deserted',     en:'Have you EVER deserted from the U.S. armed forces?', es:'¿Alguna vez ha desertado de las fuerzas armadas de EE. UU.?' }
        ];

        const FIELDS = ['fullName','countryBirth','countryCit','otherNames','address','addressTime','marital','spouseName','spouseCit','employer','occupation','basis','tripsCount','longestTrip'];

        const app = document.getElementById('app');

        function setLang(l) {
            lang = l; localStorage.setItem('lang', l);
            document.getElementById('langEn').classList.toggle('on', l === 'en');
            document.getElementById('langEs').classList.toggle('on', l === 'es');
            document.getElementById('backBtn').textContent = t('back');
            document.documentElement.lang = l;
            if (screen === 'form') captureForm();
            render();
        }

        function loadProfile() {
            try { const raw = localStorage.getItem(storageKey); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }
        function saveProfile(p) { localStorage.setItem(storageKey, JSON.stringify(p)); }
        function esc(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

        function render() {
            if (screen === 'consent') renderConsent();
            else if (screen === 'form') renderForm();
            else renderSaved();
        }

        function renderConsent() {
            app.innerHTML =
                '<h1>' + t('title') + '</h1><p class="sub">' + t('sub') + '</p>' +
                '<div class="card privacy-card">' +
                    '<h2>' + t('consentTitle') + '</h2>' +
                    '<p>' + t('consentBody') + '</p>' +
                    '<ul class="privacy-points">' +
                        '<li>' + t('p1') + '</li><li>' + t('p2') + '</li><li>' + t('p3') + '</li><li>' + t('p4') + '</li>' +
                    '</ul>' +
                    '<label class="consent-check"><input type="checkbox" id="consentBox" ' + (consentChecked ? 'checked' : '') + ' onchange="onConsent(this.checked)"><span>' + t('consentCheck') + '</span></label>' +
                    '<button class="btn-primary" id="consentBtn" ' + (consentChecked ? '' : 'disabled') + ' onclick="goForm()">' + t('consentBtn') + '</button>' +
                '</div>';
        }
        function onConsent(checked) {
            consentChecked = checked;
            document.getElementById('consentBtn').disabled = !checked;
        }
        function goForm() { if (!consentChecked) return; screen = 'form'; render(); }

        function inputField(id, type) {
            return '<div class="field"><label>' + t(id) + '</label><input type="' + (type || 'text') + '" id="f_' + id + '" value="' + esc(draft[id]) + '"></div>';
        }

        function renderForm() {
            const m = draft.marital || '';
            const sc = draft.spouseCit || '';
            const bs = draft.basis || '';
            app.innerHTML =
                '<h1>' + t('formTitle') + '</h1><p class="sub">' + t('formNote') + '</p>' +
                '<div class="card upload-card">' +
                    '<div class="upload-title">' + t('uploadTitle') + '</div>' +
                    '<p class="upload-desc">' + t('uploadDesc') + '</p>' +
                    '<label class="upload-btn">' + t('uploadBtn') +
                        '<input type="file" accept="application/pdf,.pdf" style="display:none" onchange="handleUpload(this.files[0])">' +
                    '</label>' +
                    (uploadMsg ? '<div class="upload-msg ' + uploadMsgType + '">' + uploadMsg + '</div>' : '') +
                '</div>' +
                '<div class="card">' +
                    '<div class="section-label">' + t('secIdentity') + '</div>' +
                    inputField('fullName') +
                    '<div class="grid2">' + inputField('countryBirth') + inputField('countryCit') + '</div>' +
                    inputField('otherNames') +

                    '<div class="section-label">' + t('secAddress') + '</div>' +
                    inputField('address') + inputField('addressTime') +

                    '<div class="section-label">' + t('secMarital') + '</div>' +
                    '<div class="field"><label>' + t('marital') + '</label><select id="f_marital">' +
                        '<option value="">' + t('choose') + '</option>' +
                        '<option value="single"' + (m==='single'?' selected':'') + '>' + t('mSingle') + '</option>' +
                        '<option value="married"' + (m==='married'?' selected':'') + '>' + t('mMarried') + '</option>' +
                        '<option value="divorced"' + (m==='divorced'?' selected':'') + '>' + t('mDivorced') + '</option>' +
                        '<option value="widowed"' + (m==='widowed'?' selected':'') + '>' + t('mWidowed') + '</option>' +
                    '</select></div>' +
                    '<div class="grid2">' + inputField('spouseName') +
                        '<div class="field"><label>' + t('spouseCit') + '</label><select id="f_spouseCit">' +
                            '<option value="">' + t('choose') + '</option>' +
                            '<option value="yes"' + (sc==='yes'?' selected':'') + '>' + t('yes') + '</option>' +
                            '<option value="no"' + (sc==='no'?' selected':'') + '>' + t('no') + '</option>' +
                        '</select></div>' +
                    '</div>' +

                    '<div class="section-label">' + t('secWork') + '</div>' +
                    '<div class="grid2">' + inputField('employer') + inputField('occupation') + '</div>' +

                    '<div class="section-label">' + t('secEligibility') + '</div>' +
                    '<div class="field"><label>' + t('basis') + '</label><select id="f_basis">' +
                        '<option value="">' + t('choose') + '</option>' +
                        '<option value="5yr"' + (bs==='5yr'?' selected':'') + '>' + t('basis5') + '</option>' +
                        '<option value="3yr"' + (bs==='3yr'?' selected':'') + '>' + t('basis3') + '</option>' +
                    '</select></div>' +

                    '<div class="section-label">' + t('secTravel') + '</div>' +
                    '<div class="grid2">' + inputField('tripsCount') + inputField('longestTrip') + '</div>' +

                    '<div class="section-label">' + t('secGMC') + '</div>' +
                    '<p style="color:#64748b;font-size:0.85rem;margin-bottom:0.75rem;">' + t('gmcNote') + '</p>' +
                    GMC_QUESTIONS.map(function (g, i) {
                        const ans = (draft.gmc && draft.gmc[g.id]) || '';
                        return '<div class="gmc-row"><div class="gmc-q">' + (i + 1) + '. ' + (lang === 'es' ? g.es : g.en) + '</div>' +
                            '<div class="gmc-btns">' +
                                '<button class="gmc-btn ' + (ans === 'no' ? 'no-sel' : '') + '" onclick="setGmc(\'' + g.id + '\',\'no\')">' + t('no') + '</button>' +
                                '<button class="gmc-btn ' + (ans === 'yes' ? 'yes-sel' : '') + '" onclick="setGmc(\'' + g.id + '\',\'yes\')">' + t('yes') + '</button>' +
                            '</div></div>';
                    }).join('') +

                    '<div class="row-btns"><button class="btn-primary" onclick="saveForm()">' + t('saveCont') + '</button></div>' +
                '</div>';
        }

        function setGmc(id, val) {
            captureForm();
            if (!draft.gmc) draft.gmc = {};
            draft.gmc[id] = val;
            renderForm();
        }

        // ---------- Read the fillable N-400 PDF in the browser with pdf.js (never uploaded) ----------
        let uploadMsg = '';
        let uploadMsgType = '';
        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        }

        // Get a field's value by its short name (last path segment, ignoring [n] indices).
        function fieldVal(objs, shortName) {
            for (const full in objs) {
                const seg = full.split('.').pop().replace(/\[\d+\]$/, '');
                if (seg === shortName) {
                    const arr = objs[full] || [];
                    for (let i = 0; i < arr.length; i++) {
                        const v = arr[i] && arr[i].value;
                        if (v !== undefined && v !== null && v !== '' && v !== 'Off') return ('' + v).trim();
                    }
                    return (arr[0] && arr[0].value != null) ? ('' + arr[0].value).trim() : '';
                }
            }
            return '';
        }
        function yesNo(objs, shortName) {
            const v = fieldVal(objs, shortName).replace('/', '').toUpperCase();
            if (v === 'Y' || v === 'YES' || v === '1' || v === 'TRUE') return 'yes';
            if (v === 'N' || v === 'NO') return 'no';
            return '';
        }

        async function handleUpload(file) {
            if (!file || !window.pdfjsLib) return;
            uploadMsg = t('uploadReading'); uploadMsgType = 'info';
            captureForm(); renderForm();
            try {
                const bytes = new Uint8Array(await file.arrayBuffer());
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const objs = await pdf.getFieldObjects();
                if (!objs || Object.keys(objs).length === 0) {
                    uploadMsg = t('uploadNone'); uploadMsgType = 'warn'; renderForm(); return;
                }
                captureForm();
                let filled = 0;
                function setIf(field, val) { if (val && !draft[field]) { draft[field] = val; filled++; } }

                // Part 2 — name, country of birth, citizenship
                const given = fieldVal(objs, 'P2_Line1_GivenName');
                const middle = fieldVal(objs, 'P2_Line1_MiddleName');
                const family = fieldVal(objs, 'P2_Line1_FamilyName');
                setIf('fullName', [given, middle, family].filter(Boolean).join(' '));
                setIf('countryBirth', fieldVal(objs, 'P2_Line10_CountryOfBirth'));
                setIf('countryCit', fieldVal(objs, 'P2_Line11_CountryOfNationality'));

                // Part 4 — current physical address
                const street = fieldVal(objs, 'P4_Line1_StreetName');
                const city = fieldVal(objs, 'P4_Line1_City');
                const stateAbbr = fieldVal(objs, 'P4_Line1_State');
                setIf('address', [street, city, stateAbbr].filter(Boolean).join(', '));

                // Part 5 — marital status + spouse
                const mRaw = fieldVal(objs, 'P10_Line1_MaritalStatus').replace('/', '').toUpperCase();
                const mMap = { S: 'single', M: 'married', D: 'divorced', W: 'widowed' };
                if (mMap[mRaw]) setIf('marital', mMap[mRaw]);
                const sGiven = fieldVal(objs, 'P10_Line4a_GivenName');
                const sFamily = fieldVal(objs, 'P10_Line4a_FamilyName');
                setIf('spouseName', [sGiven, sFamily].filter(Boolean).join(' '));

                // Part 7 — employment
                setIf('employer', fieldVal(objs, 'P7_EmployerName1'));
                setIf('occupation', fieldVal(objs, 'P7_OccupationFieldStudy1'));

                // Part 9 — "Have you ever" (mapped to the real N-400 field names, edition 01/20/25)
                if (!draft.gmc) draft.gmc = {};
                const gmcMap = {
                    claimedCit: 'P9_Line1', voted: 'P9_Line2', owesTaxes: 'P9_Line3', nonresidentTax: 'P9_Line4',
                    communist: 'P9_Line5a', weaponHarm: 'P12_6a', kidnapping: 'P12_6b', torture: 'P9_Line7a',
                    militaryUnit: 'P9_Line8a', armedGroup: 'P9_Line8b', detention: 'P9_Line9', weaponGroup: 'P9_Line10a',
                    weaponsTraining: 'P9_Line11', soldWeapons: 'P9_Line12', recruitedMinor: 'P9_Line13', usedMinor: 'P9_Line14',
                    crimeNoArr: 'P9_Line15a', arrested: 'P9_Line15b', completedProbation: 'P12_Line16',
                    prostitution: 'P11_Line17A', drugs: 'P11_Line17B', marriageFraud: 'P11_Line17C', bigamy: 'P12_Line17d',
                    helpedEnter: 'P12_Line17e', failedSupport: 'P12_Line17f', gambling: 'P12_Line17g', publicBenefit: 'P12_Line17h',
                    falseInfoGov: 'P12_Line18', liedToEnter: 'P12_Line19', removed: 'P12_Line20', removalProc: 'P12_Line21',
                    avoidDraft: 'P12_Line23', exemption: 'P12_Line24', servedForces: 'P12_Line25', deserted: 'P9_Line29'
                };
                Object.keys(gmcMap).forEach(function (id) {
                    if (draft.gmc[id]) return;
                    const yn = yesNo(objs, gmcMap[id]);
                    if (yn) { draft.gmc[id] = yn; filled++; }
                });

                uploadMsg = t('uploadDone')(filled); uploadMsgType = 'info';
            } catch (e) {
                console.error(e);
                uploadMsg = t('uploadFail'); uploadMsgType = 'warn';
            }
            renderForm();
        }

        function captureForm() {
            FIELDS.forEach(function (id) {
                const el = document.getElementById('f_' + id);
                if (el) draft[id] = el.value.trim();
            });
        }

        function saveForm() {
            captureForm();
            profile = Object.assign({}, draft);
            profile.gmcObj = Object.assign({}, draft.gmc || {});
            profile.gmc = GMC_QUESTIONS
                .filter(function (g) { return profile.gmcObj[g.id]; })
                .map(function (g) { return { q: g.en, a: profile.gmcObj[g.id] }; });
            saveProfile(profile);
            showNext = true;
            screen = 'saved';
            render();
        }

        function labelForValue(id, val) {
            if (!val) return t('empty');
            if (id === 'marital') return t('m' + val.charAt(0).toUpperCase() + val.slice(1));
            if (id === 'spouseCit') return val === 'yes' ? t('yes') : t('no');
            if (id === 'basis') return val === '5yr' ? t('basis5') : t('basis3');
            return val;
        }

        function renderSaved() {
            const rows = FIELDS.filter(function (id) { return profile && profile[id]; }).map(function (id) {
                return '<li><span class="k">' + t(id) + '</span><span class="v">' + esc(labelForValue(id, profile[id])) + '</span></li>';
            }).join('');
            const officerCards = OFFICERS.map(function (o) {
                return '<button class="officer-opt ' + (selectedOfficerId === o.id ? 'sel' : '') + '" onclick="selectOfficer(\'' + o.id + '\')">' +
                    '<div class="off-avatar" style="background:' + o.gradient + '">' + o.initials + '</div>' +
                    '<div><div class="off-name">' + o.name + '</div><div class="off-tag">' + o.tag + '</div></div>' +
                    '</button>';
            }).join('');
            app.innerHTML =
                '<h1>' + t('savedTitle') + '</h1><p class="sub">' + t('savedBody') + '</p>' +
                '<div class="card">' +
                    '<ul class="summary">' + (rows || '<li><span class="k">' + t('empty') + '</span></li>') + '</ul>' +
                    '<div class="officer-label">' + t('chooseOfficer') + '</div>' +
                    '<div class="officer-list">' + officerCards + '</div>' +
                    '<div class="row-btns">' +
                        '<button class="btn-primary" onclick="startInterview()">' + t('start') + '</button>' +
                        '<button class="btn-ghost" onclick="editProfile()">' + t('edit') + '</button>' +
                        '<button class="btn-danger" onclick="deleteProfile()">' + t('del') + '</button>' +
                    '</div>' +
                    (showNext ? '<div class="next-note">' + t('nextNote') + '</div>' : '') +
                '</div>';
        }

        function editProfile() { draft = Object.assign({}, profile || {}); draft.gmc = Object.assign({}, (profile && profile.gmcObj) || {}); screen = 'form'; render(); }
        function deleteProfile() {
            if (!confirm(t('delConfirm'))) return;
            localStorage.removeItem(storageKey);
            profile = null; draft = {}; consentChecked = false; showNext = false;
            screen = 'consent'; render();
        }
        function selectOfficer(id) {
            selectedOfficerId = id;
            const off = OFFICERS.find(function (o) { return o.id === id; });
            if (off) localStorage.setItem('selectedOfficer', JSON.stringify(off));
            render();
        }
        function startInterview() {
            const off = OFFICERS.find(function (o) { return o.id === selectedOfficerId; }) || OFFICERS[0];
            localStorage.setItem('selectedOfficer', JSON.stringify(off));
            window.location.href = 'n400.html?mode=personal';
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            userId = session.user.id;
            storageKey = 'n400Profile:' + userId;
            try { const so = JSON.parse(localStorage.getItem('selectedOfficer')); if (so && so.id) selectedOfficerId = so.id; } catch (e) {}
            profile = loadProfile();
            screen = profile ? 'saved' : 'consent';
            setLang(lang);
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        init();
    </script>
</body>
</html>
