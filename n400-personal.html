                    '<div class="field"><label>' + t('marital') + '</label><select id="f_marital">' +
                        '<option value="">' + t('choose') + '</option>' +
                        '<option value="single"' + (m==='single'?' selected':'') + '>' + t('mSingle') + '</option>' +
                        '<option value="married"' + (m==='married'?' selected':'') + '>' + t('mMarried') + '</option>' +
                        '<option value="divorced"' + (m==='divorced'?' selected':'') + '>' + t('mDivorced') + '</option>' +
                        '<option value="widowed"' + (m==='widowed'?' selected':'') + '>' + t('mWidowed') + '</option>' +
                    '</select></div>' +
                    '<div class="grid2">' + inputField('spouseName') +
                        '<div class="field"><label>' + t('spouseCit') + '</label><select id="f_spouseCit">' +
                            '<option value="">' + t('choose') + '</option>' +
                            '<option value="yes"' + (sc==='yes'?' selected':'') + '>' + t('yes') + '</option>' +
                            '<option value="no"' + (sc==='no'?' selected':'') + '>' + t('no') + '</option>' +
                        '</select></div>' +
                    '</div>' +

                    '<div class="section-label">' + t('secWork') + '</div>' +
                    '<div class="grid2">' + inputField('employer') + inputField('occupation') + '</div>' +

                    '<div class="section-label">' + t('secEligibility') + '</div>' +
                    '<div class="field"><label>' + t('basis') + '</label><select id="f_basis">' +
                        '<option value="">' + t('choose') + '</option>' +
                        '<option value="5yr"' + (bs==='5yr'?' selected':'') + '>' + t('basis5') + '</option>' +
                        '<option value="3yr"' + (bs==='3yr'?' selected':'') + '>' + t('basis3') + '</option>' +
                    '</select></div>' +

                    '<div class="section-label">' + t('secTravel') + '</div>' +
                    '<div class="grid2">' + inputField('tripsCount') + inputField('longestTrip') + '</div>' +

                    '<div class="section-label">' + t('secGMC') + '</div>' +
                    '<p style="color:#64748b;font-size:0.85rem;margin-bottom:0.75rem;">' + t('gmcNote') + '</p>' +
                    GMC_QUESTIONS.map(function (g, i) {
                        const ans = (draft.gmc && draft.gmc[g.id]) || '';
                        return '<div class="gmc-row"><div class="gmc-q">' + (i + 1) + '. ' + (lang === 'es' ? g.es : g.en) + '</div>' +
                            '<div class="gmc-btns">' +
                                '<button class="gmc-btn ' + (ans === 'no' ? 'no-sel' : '') + '" onclick="setGmc(\'' + g.id + '\',\'no\')">' + t('no') + '</button>' +
                                '<button class="gmc-btn ' + (ans === 'yes' ? 'yes-sel' : '') + '" onclick="setGmc(\'' + g.id + '\',\'yes\')">' + t('yes') + '</button>' +
                            '</div></div>';
                    }).join('') +

                    '<div class="row-btns"><button class="btn-primary" onclick="saveForm()">' + t('saveCont') + '</button></div>' +
                '</div>';
        }

        function setGmc(id, val) {
            captureForm();
            if (!draft.gmc) draft.gmc = {};
            draft.gmc[id] = val;
            renderForm();
        }

        // ---------- Read the fillable N-400 PDF in the browser (never uploaded) ----------
        let uploadMsg = '';
        let uploadMsgType = '';

        function findVal(values, words) {
            const keys = Object.keys(values);
            for (let i = 0; i < keys.length; i++) {
                const lk = keys[i].toLowerCase();
                const ok = words.every(function (w) { return lk.indexOf(w) !== -1; });
                if (ok && values[keys[i]]) return values[keys[i]];
            }
            return '';
        }

        async function handleUpload(file) {
            if (!file || !window.PDFLib) return;
            uploadMsg = t('uploadReading'); uploadMsgType = 'info';
            captureForm(); renderForm();
            try {
                const bytes = await file.arrayBuffer();
                const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true, updateMetadata: false });
                const form = doc.getForm();
                const fields = form.getFields();
                const values = {};
                fields.forEach(function (f) {
                    try {
                        const name = f.getName();
                        if (f instanceof PDFLib.PDFTextField) { const v = f.getText(); if (v) values[name] = v.trim(); }
                        else if (f instanceof PDFLib.PDFDropdown) { const s = f.getSelected(); if (s && s.length) values[name] = s.join(', '); }
                        else if (f instanceof PDFLib.PDFRadioGroup) { const s = f.getSelected(); if (s) values[name] = s; }
                    } catch (e) {}
                });
                captureForm();
                let filled = 0;
                function setIf(field, val) { if (val && !draft[field]) { draft[field] = val; filled++; } }

                const given = findVal(values, ['given']) || findVal(values, ['first']);
                const family = findVal(values, ['family']) || findVal(values, ['last']);
                const full = (given + ' ' + family).trim();
                setIf('fullName', full);
                setIf('countryBirth', findVal(values, ['country', 'birth']));
                setIf('countryCit', findVal(values, ['country', 'nationality']) || findVal(values, ['country', 'citizen']));
                const street = findVal(values, ['street']);
                const city = findVal(values, ['city']);
                setIf('address', [street, city].filter(Boolean).join(', '));
                setIf('employer', findVal(values, ['employer']));
                setIf('occupation', findVal(values, ['occupation']));

                if (Object.keys(values).length === 0) { uploadMsg = t('uploadNone'); uploadMsgType = 'warn'; }
                else { uploadMsg = t('uploadDone')(filled); uploadMsgType = 'info'; }
            } catch (e) {
                console.error(e);
                uploadMsg = t('uploadFail'); uploadMsgType = 'warn';
            }
            renderForm();
        }

        function captureForm() {
            FIELDS.forEach(function (id) {
                const el = document.getElementById('f_' + id);
                if (el) draft[id] = el.value.trim();
            });
        }

        function saveForm() {
            captureForm();
            profile = Object.assign({}, draft);
            profile.gmcObj = Object.assign({}, draft.gmc || {});
            profile.gmc = GMC_QUESTIONS
                .filter(function (g) { return profile.gmcObj[g.id]; })
                .map(function (g) { return { q: g.en, a: profile.gmcObj[g.id] }; });
            saveProfile(profile);
            showNext = true;
            screen = 'saved';
            render();
        }

        function labelForValue(id, val) {
            if (!val) return t('empty');
            if (id === 'marital') return t('m' + val.charAt(0).toUpperCase() + val.slice(1));
            if (id === 'spouseCit') return val === 'yes' ? t('yes') : t('no');
            if (id === 'basis') return val === '5yr' ? t('basis5') : t('basis3');
            return val;
        }

        function renderSaved() {
            const rows = FIELDS.filter(function (id) { return profile && profile[id]; }).map(function (id) {
                return '<li><span class="k">' + t(id) + '</span><span class="v">' + esc(labelForValue(id, profile[id])) + '</span></li>';
            }).join('');
            const officerCards = OFFICERS.map(function (o) {
                return '<button class="officer-opt ' + (selectedOfficerId === o.id ? 'sel' : '') + '" onclick="selectOfficer(\'' + o.id + '\')">' +
                    '<div class="off-avatar" style="background:' + o.gradient + '">' + o.initials + '</div>' +
                    '<div><div class="off-name">' + o.name + '</div><div class="off-tag">' + o.tag + '</div></div>' +
                    '</button>';
            }).join('');
            app.innerHTML =
                '<h1>' + t('savedTitle') + '</h1><p class="sub">' + t('savedBody') + '</p>' +
                '<div class="card">' +
                    '<ul class="summary">' + (rows || '<li><span class="k">' + t('empty') + '</span></li>') + '</ul>' +
                    '<div class="officer-label">' + t('chooseOfficer') + '</div>' +
                    '<div class="officer-list">' + officerCards + '</div>' +
                    '<div class="row-btns">' +
                        '<button class="btn-primary" onclick="startInterview()">' + t('start') + '</button>' +
                        '<button class="btn-ghost" onclick="editProfile()">' + t('edit') + '</button>' +
                        '<button class="btn-danger" onclick="deleteProfile()">' + t('del') + '</button>' +
                    '</div>' +
                    (showNext ? '<div class="next-note">' + t('nextNote') + '</div>' : '') +
                '</div>';
        }

        function editProfile() { draft = Object.assign({}, profile || {}); draft.gmc = Object.assign({}, (profile && profile.gmcObj) || {}); screen = 'form'; render(); }
        function deleteProfile() {
            if (!confirm(t('delConfirm'))) return;
            localStorage.removeItem(storageKey);
            profile = null; draft = {}; consentChecked = false; showNext = false;
            screen = 'consent'; render();
        }
        function selectOfficer(id) {
            selectedOfficerId = id;
            const off = OFFICERS.find(function (o) { return o.id === id; });
            if (off) localStorage.setItem('selectedOfficer', JSON.stringify(off));
            render();
        }
        function startInterview() {
            const off = OFFICERS.find(function (o) { return o.id === selectedOfficerId; }) || OFFICERS[0];
            localStorage.setItem('selectedOfficer', JSON.stringify(off));
            window.location.href = 'n400.html?mode=personal';
        }

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            userId = session.user.id;
            storageKey = 'n400Profile:' + userId;
            try { const so = JSON.parse(localStorage.getItem('selectedOfficer')); if (so && so.id) selectedOfficerId = so.id; } catch (e) {}
            profile = loadProfile();
            screen = profile ? 'saved' : 'consent';
            setLang(lang);
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        init();
    </script>
</body>
