<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Citizenship AI Interview Practice</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Arial, sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid #e5e5e5; }
    main { max-width:1100px; margin:0 auto; padding:20px; }
    #app { min-height: 70vh; display:flex; align-items:center; justify-content:center; font-size:18px; }
  </style>
</head>
<body>
  <header>
    <h1>Citizenship AI Interview Practice</h1>
  </header>
  <main>
    <div id="app">Loading…</div>
  </main>

  <!-- Cargamos tu motor como script NO-módulo -->
  <script src="./modules/quick-ai-engine.js"></script>

  <!-- Inicializamos el motor -->
  <script>
    (async () => {
      const mount = document.getElementById('app');
      try {
        if (typeof QuickAIEngine === 'undefined') {
          throw new Error('QuickAIEngine no encontrado. ¿Se cargó ./modules/quick-ai-engine.js?');
        }

        const engine = new QuickAIEngine();
        const ok = await engine.initialize(); // lee ./data/curated_interview_patterns.json

        if (!ok) throw new Error('initialize() devolvió false');

        // Si tu motor expone otros métodos, los podemos usar aquí:
        // if (engine.loadCivics) await engine.loadCivics('./data/civics_2008.json');
        // if (engine.mountUI) engine.mountUI(mount);

        mount.textContent = '✅ Motor inicializado. (UI por montar)';
      } catch (err) {
        console.error(err);
        mount.textContent = '❌ ' + (err?.message || 'Error al iniciar la app');
      }
    })();
  </script>
</body>
</html>
