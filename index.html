<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Citizenship AI Interview Practice</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Arial, sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid #e5e5e5; }
    main { max-width:1100px; margin:0 auto; padding:20px; }
    #status { margin: 10px 0 20px; font-weight: 600; }
    #app { min-height: 65vh; display:flex; align-items:center; justify-content:center; font-size:18px; }
  </style>
</head>
<body>
  <header>
    <h1>Citizenship AI Interview Practice</h1>
  </header>

  <main>
    <div id="status">Inicializando…</div>
    <div id="app">Loading…</div>
  </main>

  <!-- 1) Carga clásica: si el script define QuickAIEngine en el global, esto lo hace disponible -->
  <script src="./modules/quick-ai-engine.js"></script>

  <!-- 2) Inicialización con autodetección (global o ES module) -->
  <script>
    (async () => {
      const status = document.getElementById('status');
      const mount  = document.getElementById('app');
      const bust   = 'v=' + Date.now(); // cache-buster para pruebas

      try {
        let Engine = (typeof QuickAIEngine !== 'undefined') ? QuickAIEngine : null;

        // Si no quedó global, intentamos importarlo como módulo
        if (!Engine) {
          const mod = await import('./modules/quick-ai-engine.js?' + bust);
          Engine = mod.default || mod.QuickAIEngine || window.QuickAIEngine || null;
        }

        if (!Engine) throw new Error('QuickAIEngine no encontrado (global ni como módulo)');

        const engine = new Engine();

        // initialize() ya carga ./data/curated_interview_patterns.json dentro del motor
        const ok = await engine.initialize();
        if (!ok) throw new Error('initialize() devolvió false');

        // (Opcional) si el motor expone más métodos, los llamas aquí:
        if (typeof engine.loadCivics === 'function') {
          await engine.loadCivics('./data/civics_2008.json?' + bust);
        }
        if (typeof engine.mountUI === 'function') {
          engine.mountUI(mount);  // Pintar UI propia del motor
        } else {
          mount.textContent = '✅ Motor inicializado. (UI por montar)';
        }

        status.textContent = '✅ Listo';
      } catch (err) {
        console.error('init error →', err);
        status.textContent = '❌ Error inicializando';
        mount.textContent  = (err && err.message) ? err.message : String(err);
      }
    })();
  </script>

  <noscript>Activa JavaScript para usar esta herramienta.</noscript>
</body>
</html>
