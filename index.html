<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Citizenship AI Interview Practice</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Arial, sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid #e5e5e5; }
    main { max-width:1100px; margin:0 auto; padding:20px; }
    #status { margin: 10px 0 16px; font-weight: 600; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .panel { border:1px solid #e5e5e5; border-radius:12px; padding:16px; margin-top:12px; }
    .q { font-size:20px; font-weight:700; margin:4px 0 8px; }
    .muted { opacity:.8 }
    .ok { color:#22c55e } .err{ color:#ef4444 } .warn{ color:#f59e0b }
    textarea, input[type="text"] { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; font-size:16px; }
    button { padding:10px 14px; border-radius:10px; border:1px solid #ddd; cursor:pointer; }
    button.primary { background:#111; color:#fff; border:1px solid #111; }
    .pill { padding:6px 10px; border:1px solid #ddd; border-radius:999px; font-size:14px; }
    .meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .small { font-size: 13px; }
    .hint { padding:8px 10px; border-radius:8px; background:rgba(0,0,0,.05); }
  </style>
</head>
<body>
  <header><h1>Citizenship AI Interview Practice</h1></header>

  <main>
    <div id="status" class="muted">Inicializando…</div>

    <!-- Controles -->
    <div class="panel">
      <div class="row">
        <label class="pill">Modo:
          <select id="mode">
            <option value="civics">Civics (2008)</option>
            <option value="n400">N-400 (beta)</option>
          </select>
        </label>
        <label class="pill">Nº Preguntas:
          <select id="count">
            <option>10</option><option>20</option><option selected>30</option><option>50</option>
          </select>
        </label>
        <button id="btnStart" class="primary">Empezar práctica</button>
        <div id="progress" class="muted small"></div>
      </div>
    </div>

    <!-- Área de práctica -->
    <div id="practice" class="panel" style="display:none;">
      <div class="meta">
        <span id="score" class="pill">✔ 0 / 0</span>
        <span id="result" class="pill muted">—</span>
      </div>

      <div id="question" class="q">Pregunta…</div>
      <div class="muted small" id="subtitle"></div>

      <div class="row">
        <textarea id="answer" rows="4" placeholder="Escribe tu respuesta aquí…"></textarea>
      </div>

      <div class="row">
        <button id="btnCheck" class="primary">Comprobar</button>
        <button id="btnNext">Siguiente</button>
        <button id="btnHint">Ver pista</button>
        <span id="hint" class="hint small" style="display:none;"></span>
      </div>
    </div>

    <!-- Resultado final -->
    <div id="summary" class="panel" style="display:none;"></div>
  </main>

  <script type="module">
    // ---- Utilidades ----
    const $ = (id) => document.getElementById(id);
    const sleep = (ms)=> new Promise(r=>setTimeout(r,ms));
    const norm = (s)=> String(s||'').toLowerCase()
      .normalize('NFD').replace(/\p{Diacritic}/gu,'')
      .replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();

    // Coincidencia blanda: ¿user contiene una de las respuestas?
    const isCorrect = (user, answers=[]) => {
      const u = norm(user);
      for (const a of answers) {
        const na = norm(a);
        if (!na) continue;
        if (u === na) return true;
        if (u.includes(na) || na.includes(u)) return true;
      }
      return false;
    };

    // Parseo tolerante de Civics (distintos formatos de JSON)
    function asCivicsList(data){
      // casos típicos: [{question:"", answers:["",""]}] ó {questions:[...]}
      const arr = Array.isArray(data) ? data : (data.questions || data.items || []);
      return arr.map((q,i)=>{
        const question = q.question || q.q || q.text || q.p || `Question #${i+1}`;
        let answers = q.answers || q.a || q.accept || q.accepted || q.answer || q.correct || [];
        if (!Array.isArray(answers)) answers = [answers];
        return { question, answers };
      }).filter(x=>x.question);
    }

    // Parseo básico de patrones N-400 (si existen)
    function asN400Steps(patterns){
      const arr = patterns?.patterns || patterns?.steps || patterns || [];
      return arr.map((s,i)=>({
        officer: s.officer || s.prompt || s.q || `Officer question #${i+1}`,
        expected: s.applicant_expected || s.expected || s.a || ''
      })).filter(x=>x.officer);
    }

    // ---- Estado global de la práctica ----
    const state = {
      engine: null,
      civics: [],
      n400: [],
      mode: 'civics',
      queue: [],
      index: 0,
      correct: 0
    };

    // ---- Carga / Inicialización ----
    const status = $('status');
    async function boot(){
      try {
        // 1) Importar el motor (autodetección)
        let EngineClass;
        try {
          const mod = await import('./modules/quick-ai-engine.js');
          EngineClass = mod.default || mod.QuickAIEngine || window.QuickAIEngine;
        } catch {
          EngineClass = window.QuickAIEngine;
        }
        if (!EngineClass) throw new Error('QuickAIEngine no encontrado');

        const engine = new EngineClass();
        state.engine = engine;

        // 2) Cargar JSON (sin depender de initialize())
        const [patRes, civRes] = await Promise.all([
          fetch('./data/curated_interview_patterns.json'),
          fetch('./data/civics_2008.json')
        ]);
        const [patterns, civicsRaw] = await Promise.all([patRes.json(), civRes.json()]);

        engine.patterns = patterns;
        engine.civics   = civicsRaw;
        engine.initialized = true;

        state.civics = asCivicsList(civicsRaw);
        state.n400   = asN400Steps(patterns);

        status.innerHTML = '<span class="ok">✅ Listo</span>';
      } catch (e) {
        console.error(e);
        status.innerHTML = '<span class="err">❌ Error inicializando</span>';
        throw e;
      }
    }

    // ---- Lógica de la práctica ----
    function startPractice(){
      state.mode = $('mode').value;
      const count = parseInt($('count').value, 10) || 10;

      const pool = (state.mode === 'civics') ? state.civics : state.n400.map(s=>({
        question: s.officer,
        answers: s.expected ? [s.expected] : []
      }));

      const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0, count);

      state.queue   = shuffled;
      state.index   = 0;
      state.correct = 0;

      $('practice').style.display = '';
      $('summary').style.display  = 'none';
      $('result').textContent = '—';
      $('score').textContent  = `✔ 0 / ${state.queue.length}`;
      $('progress').textContent = `0 / ${state.queue.length}`;
      $('hint').style.display = 'none';
      $('answer').value = '';

      renderQuestion();
    }

    function renderQuestion(){
      const item = state.queue[state.index];
      $('question').textContent = item?.question || 'Pregunta';
      $('subtitle').textContent = (state.mode==='civics')
        ? 'Responde en inglés como en el examen.'
        : 'Simulación N-400 (puedes ver pista).';
    }

    function showHint(){
      const item = state.queue[state.index];
      const hint = (item?.answers && item.answers[0]) ? item.answers[0] : 'Sin pista disponible';
      $('hint').textContent = hint;
      $('hint').style.display = '';
    }

    function checkAnswer(){
      const item = state.queue[state.index];
      const user = $('answer').value;
      let ok = false;

      if (state.mode === 'civics'){
        ok = isCorrect(user, item.answers);
      } else {
        // En N-400 damos correct si el usuario escribió algo; la pista sirve de guía
        ok = user.trim().length > 0;
      }

      if (ok) {
        state.correct++;
        $('result').textContent = 'Correcto ✔';
        $('result').className = 'pill ok';
      } else {
        $('result').textContent = 'Revisa ✖';
        $('result').className = 'pill err';
      }
      $('score').textContent = `✔ ${state.correct} / ${state.queue.length}`;
    }

    function nextQuestion(){
      if (state.index < state.queue.length - 1) {
        state.index++;
        $('progress').textContent = `${state.index} / ${state.queue.length}`;
        $('answer').value = '';
        $('result').textContent = '—';
        $('result').className = 'pill muted';
        $('hint').style.display = 'none';
        renderQuestion();
      } else {
        finish();
      }
    }

    function finish(){
      $('practice').style.display = 'none';
      const total = state.queue.length;
      const pct   = Math.round((state.correct/total)*100);
      $('summary').style.display = '';
      $('summary').innerHTML = `
        <h2>Resultados</h2>
        <p>Correctas: <b>${state.correct}</b> de <b>${total}</b> (<b>${pct}%</b>).</p>
        <button id="btnRestart" class="primary">Repetir práctica</button>
      `;
      $('btnRestart')?.addEventListener('click', startPractice);
    }

    // ---- Eventos UI ----
    $('btnStart').addEventListener('click', startPractice);
    $('btnCheck').addEventListener('click', checkAnswer);
    $('btnNext').addEventListener('click', nextQuestion);
    $('btnHint').addEventListener('click', showHint);

    // Boot
    boot().catch(()=>{});
  </script>

  <noscript>Activa JavaScript para usar esta herramienta.</noscript>
</body>
</html>
