<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Citizenship AI Interview Practice</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Arial, sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid #e5e5e5; }
    main { max-width:1100px; margin:0 auto; padding:20px; }
    #status { margin:10px 0 20px; font-weight:600; }
    #app { min-height:65vh; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .ok{color:#22c55e}.err{color:#ef4444}.muted{opacity:.8}
  </style>
</head>
<body>
  <header><h1>Citizenship AI Interview Practice</h1></header>
  <main>
    <div id="status" class="muted">Inicializando…</div>
    <div id="app">Loading…</div>
  </main>

  <!-- IMPORTA COMO MÓDULO (NO agregues <script src=...> clásico) -->
  <script type="module">
    import QuickAIEngine from './modules/quick-ai-engine.js'; // asegúrate que el archivo tenga: export default QuickAIEngine;

    const status = document.getElementById('status');
    const mount  = document.getElementById('app');
    const bust   = 'v=' + Date.now();

    try {
      const engine = new QuickAIEngine();

      // Carga directa de JSON (evitamos initialize() hasta reparar el JSON)
      const [patRes, civRes] = await Promise.all([
        fetch('./data/curated_interview_patterns.json?' + bust),
        fetch('./data/civics_2008.json?' + bust),
      ]);
      if (!patRes.ok) throw new Error('No se pudo cargar curated_interview_patterns.json ('+patRes.status+')');
      if (!civRes.ok) throw new Error('No se pudo cargar civics_2008.json ('+civRes.status+')');

      engine.patterns = await patRes.json(); // <- Aquí falla si tu JSON está mal
      engine.civics   = await civRes.json();
      engine.initialized = true;

      if (typeof engine.mountUI === 'function') {
        engine.mountUI(mount);
      } else {
        mount.textContent = '✅ Motor listo. (UI por montar)';
      }
      status.innerHTML = '<span class="ok">✅ Listo</span>';
    } catch (e) {
      console.error('init error →', e);
      status.innerHTML = '<span class="err">❌ Error inicializando</span>';
      mount.textContent = (e && e.message) ? e.message : String(e);
    }
  </script>

  <noscript>Activa JavaScript para usar esta herramienta.</noscript>
</body>
</html>

</body>
</html>
