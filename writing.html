<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Practice - USCIS Interviews.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #0f172a; line-height: 1.6; }

        .loading-overlay { position: fixed; inset: 0; background: #f8fafc; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .loading-overlay.hidden { display: none; }
        .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0.875rem 0; position: sticky; top: 0; z-index: 1000; }
        .topbar-inner { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; color: #0f172a; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .top-actions { display: flex; align-items: center; gap: 0.75rem; }
        .lang-toggle { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 2rem; padding: 0.3rem; display: flex; gap: 0.15rem; }
        .lang-toggle button { border: none; background: transparent; padding: 0.25rem 0.7rem; border-radius: 2rem; font-weight: 700; font-size: 0.8rem; cursor: pointer; color: #64748b; font-family: inherit; }
        .lang-toggle button.on { background: #1e40af; color: white; }
        .btn-back { background: white; color: #475569; border: 1px solid #e2e8f0; padding: 0.45rem 0.9rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: none; }

        .wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
        .sub { color: #64748b; margin-bottom: 1.75rem; }
        .opts { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
        .opt { background: white; color: #475569; border: 2px solid #e2e8f0; padding: 0.7rem 1.2rem; border-radius: 0.6rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .opt.sel { border-color: #1e40af; background: #eff6ff; color: #1e40af; }
        .btn-primary { background: #1e40af; color: white; border: none; padding: 1rem 2rem; border-radius: 0.7rem; font-size: 1.05rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .btn-primary:hover { background: #1e3a8a; transform: translateY(-1px); }
        .btn-ghost { background: white; color: #1e40af; border: 2px solid #1e40af; padding: 0.85rem 1.5rem; border-radius: 0.7rem; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; text-align: center; }
        .note { color: #94a3b8; font-size: 0.85rem; margin-top: 1.25rem; }

        .progress { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
        .btn-exit { background: white; color: #64748b; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.4rem 0.8rem; font-weight: 600; font-size: 0.8rem; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .btn-exit:hover { border-color: #dc2626; color: #dc2626; }
        .progress-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #1e40af; transition: width 0.3s; }
        .progress-text { font-size: 0.85rem; color: #64748b; font-weight: 600; white-space: nowrap; }

        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .dictate { text-align: center; margin-bottom: 1.5rem; }
        .btn-hear { background: #1e40af; color: white; border: none; border-radius: 0.7rem; padding: 0.9rem 1.5rem; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-hear:hover { background: #1e3a8a; }
        .hint { color: #94a3b8; font-size: 0.85rem; margin-top: 0.6rem; }
        textarea { width: 100%; padding: 0.9rem 1rem; border: 2px solid #e2e8f0; border-radius: 0.6rem; font-size: 1.1rem; font-family: inherit; resize: none; }
        textarea:focus { outline: none; border-color: #1e40af; }
        .check-row { margin-top: 1rem; display: flex; gap: 0.75rem; }
        .check-row button { flex: 1; }

        .feedback { margin-top: 1.25rem; border-radius: 0.75rem; padding: 1rem 1.25rem; display: none; }
        .feedback.show { display: block; }
        .feedback.ok { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .feedback.no { background: #fff7ed; border: 1px solid #fed7aa; }
        .feedback .ftitle { font-weight: 800; margin-bottom: 0.35rem; }
        .feedback.ok .ftitle { color: #16a34a; }
        .feedback.no .ftitle { color: #c2410c; }
        .feedback .correct { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
        .feedback .lbl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; font-weight: 700; }

        .result-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 2.5rem 2rem; text-align: center; }
        .result-emoji { font-size: 3rem; }
        .result-score { font-size: 2.5rem; font-weight: 800; color: #1e40af; margin: 0.5rem 0; }
        .result-actions { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

    <div class="topbar">
        <div class="topbar-inner">
            <a href="dashboard.html" class="logo"><img src="uscisinterviews_ai_logo.png" alt="USCIS Interviews.AI" style="height:34px;width:34px;object-fit:contain;vertical-align:middle;margin-right:0.45rem;"> USCIS Interviews<span style="color:#dc2626;">.AI</span></a>
            <div class="top-actions">
                <div class="lang-toggle">
                    <button id="langEn" onclick="setLang('en')">EN</button>
                    <button id="langEs" onclick="setLang('es')">ES</button>
                </div>
                <a href="dashboard.html" class="btn-back" id="backBtn">← Hub</a>
            </div>
        </div>
    </div>

    <div class="wrap" id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vugvnqapdxyewxyfaayl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vFFY4GL2f8PIGrArW05ncg_PVkcgV4M';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const T = {
            en: {
                back:'← Hub', exit:'✕ Exit', title:'Writing Practice',
                sub:'Just like the real test: the officer dictates a sentence and you write it. Tap to hear it, then type what you hear.',
                howMany:'How many sentences?', all:'All', start:'Start →',
                hear:'🔊 Hear the sentence', again:'Hear again',
                placeholder:'Type the sentence you hear…', check:'Check', skip:'Skip',
                hintListen:'Tap the button to hear the sentence. You can replay it as many times as you need.',
                correct:'Correct!', notQuite:'Not quite.', theSentence:'The sentence was:',
                qof:(i,n)=>`Sentence ${i} of ${n}`,
                done:'Practice complete!', score:(k,n)=>`You wrote ${k} of ${n} correctly`,
                againBtn:'Practice again', toHub:'Back to hub',
                note:'Sentences are built from the official USCIS writing vocabulary list. (USCIS does not publish the exact test sentences.)'
            },
            es: {
                back:'← Inicio', exit:'✕ Salir', title:'Práctica de Escritura',
                sub:'Igual que el examen real: el oficial dicta una oración y tú la escribes. Toca para escucharla y escribe lo que oyes.',
                howMany:'¿Cuántas oraciones?', all:'Todas', start:'Empezar →',
                hear:'🔊 Escuchar la oración', again:'Escuchar de nuevo',
                placeholder:'Escribe la oración que escuchas…', check:'Revisar', skip:'Saltar',
                hintListen:'Toca el botón para escuchar la oración. Puedes repetirla las veces que necesites.',
                correct:'¡Correcto!', notQuite:'Casi.', theSentence:'La oración era:',
                qof:(i,n)=>`Oración ${i} de ${n}`,
                done:'¡Práctica completa!', score:(k,n)=>`Escribiste ${k} de ${n} correctamente`,
                againBtn:'Practicar de nuevo', toHub:'Volver al inicio',
                note:'Las oraciones se arman con la lista oficial de vocabulario de escritura de USCIS. (USCIS no publica las oraciones exactas del examen.)'
            }
        };
        let lang = localStorage.getItem('lang') || 'en';
        function t(k){ return T[lang][k]; }

        // Practice sentences built from the official USCIS writing vocabulary.
        const SENTENCES = [
            'Citizens can vote.',
            'People vote for President.',
            'Adams was a President.',
            'Lincoln was President during the Civil War.',
            'The President lives in the White House.',
            'The White House is in Washington, D.C.',
            'The flag is red, white, and blue.',
            'Citizens have the right to vote.',
            'We pay taxes.',
            'Memorial Day is in May.',
            "Presidents' Day is in February.",
            'Labor Day is in September.',
            'Columbus Day is in October.',
            'Thanksgiving is in November.',
            'Congress meets in Washington.',
            'Citizens can come to the United States.',
            'People want freedom of speech.',
            'Alaska is the largest state.',
            'New York City is in the United States.',
            'Canada is north of the United States.',
            'Mexico is south of the United States.',
            'Senators meet in Congress.',
            'We have freedom of speech.',
            'The United States has fifty states.'
        ];

        const state = { screen:'setup', count:10, list:[], index:0, score:0, checked:false, lastOk:false };
        const app = document.getElementById('app');

        function setLang(l){
            lang=l; localStorage.setItem('lang', l);
            document.getElementById('langEn').classList.toggle('on', l==='en');
            document.getElementById('langEs').classList.toggle('on', l==='es');
            document.getElementById('backBtn').textContent = t('back');
            document.documentElement.lang = l;
            render();
        }

        function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
        function normalize(s){ return String(s).toLowerCase().replace(/[.,!?;:'"-]/g,'').replace(/\s+/g,' ').trim(); }

        function speak(text){
            if(!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function render(){
            if(state.screen==='setup') renderSetup();
            else if(state.screen==='practice') renderPractice();
            else renderResults();
        }

        function renderSetup(){
            const counts=[5,10,'all'];
            const btns=counts.map(c=>{
                const val=(c==='all')?'all':c; const label=(c==='all')?t('all'):c;
                return `<button class="opt ${String(state.count)===String(val)?'sel':''}" onclick="pickCount('${val}')">${label}</button>`;
            }).join('');
            app.innerHTML = `
                <h1>${t('title')}</h1>
                <p class="sub">${t('sub')}</p>
                <div style="font-weight:700;color:#334155;margin-bottom:0.75rem;">${t('howMany')}</div>
                <div class="opts">${btns}</div>
                <button class="btn-primary" onclick="start()">${t('start')}</button>
                <p class="note">${t('note')}</p>
            `;
        }
        function pickCount(v){ state.count=(v==='all')?'all':parseInt(v,10); renderSetup(); }

        function start(){
            let list = shuffle(SENTENCES);
            if(state.count!=='all') list=list.slice(0,state.count);
            state.list=list; state.index=0; state.score=0; state.checked=false; state.screen='practice';
            render();
            setTimeout(()=>speak(state.list[0]), 400);
        }

        function renderPractice(){
            const total=state.list.length, cur=state.list[state.index];
            const pct=Math.round((state.index/total)*100);
            app.innerHTML = `
                <div class="progress">
                    <button class="btn-exit" onclick="state.screen='setup';render();">${t('exit')}</button>
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <div class="progress-text">${t('qof')(state.index+1,total)}</div>
                </div>
                <div class="card">
                    <div class="dictate">
                        <button class="btn-hear" onclick="speak(state.list[state.index])">${state.checked? t('again') : t('hear')}</button>
                        <div class="hint">${t('hintListen')}</div>
                    </div>
                    <textarea id="answer" rows="2" placeholder="${t('placeholder')}" ${state.checked?'disabled':''}>${state.typed||''}</textarea>
                    <div class="feedback ${state.checked?(state.lastOk?'ok show':'no show'):''}">
                        <div class="ftitle">${state.lastOk? t('correct') : t('notQuite')}</div>
                        <div class="lbl">${t('theSentence')}</div>
                        <div class="correct">${escapeHtml(cur)}</div>
                    </div>
                    <div class="check-row">
                        ${state.checked
                            ? `<button class="btn-primary" onclick="next()">→</button>`
                            : `<button class="btn-primary" onclick="check()">${t('check')}</button>`}
                    </div>
                </div>
            `;
            if(!state.checked){ const a=document.getElementById('answer'); if(a) a.focus(); }
        }

        function check(){
            const a=document.getElementById('answer');
            state.typed=a.value;
            const cur=state.list[state.index];
            state.lastOk = normalize(a.value)===normalize(cur);
            if(state.lastOk) state.score++;
            state.checked=true;
            renderPractice();
        }

        function next(){
            state.index++; state.checked=false; state.typed='';
            if(state.index>=state.list.length){ state.screen='results'; render(); }
            else { renderPractice(); setTimeout(()=>speak(state.list[state.index]), 300); }
        }

        function renderResults(){
            const total=state.list.length, k=state.score;
            const good=(k/total)>=0.6;
            app.innerHTML = `
                <div class="result-card">
                    <div class="result-emoji">${good?'🎉':'💪'}</div>
                    <h1>${t('done')}</h1>
                    <div class="result-score">${t('score')(k,total)}</div>
                    <div class="result-actions">
                        <button class="btn-ghost" onclick="state.screen='setup';render();">${t('againBtn')}</button>
                        <a href="dashboard.html" class="btn-ghost">${t('toHub')}</a>
                    </div>
                </div>
            `;
        }

        function escapeHtml(s){ return String(s).replace(/</g,'&lt;'); }

        async function init(){
            const { data:{session} } = await supabaseClient.auth.getSession();
            if(!session){ window.location.href='index.html'; return; }
            setLang(lang);
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        init();
    </script>
</body>
</html>
